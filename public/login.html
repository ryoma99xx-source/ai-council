<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI参謀会議 — ログイン</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  background:#080b0f;
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif JP',serif;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(96,165,250,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(96,165,250,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}
.wrap{width:360px;text-align:center;position:relative;z-index:1;padding:20px;}
.sigil{
  width:72px;height:72px;margin:0 auto 28px;
  background:linear-gradient(135deg,#60a5fa,#c084fc);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  box-shadow:0 0 40px rgba(96,165,250,0.3);
  animation:glow 3s ease-in-out infinite;
}
@keyframes glow{
  0%,100%{box-shadow:0 0 40px rgba(96,165,250,0.3);}
  50%{box-shadow:0 0 60px rgba(192,132,252,0.5);}
}
h1{font-size:26px;color:#f0f4f8;letter-spacing:0.1em;margin-bottom:6px;}
.sub{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:#4a6080;
  letter-spacing:0.3em;margin-bottom:40px;
}
.field{margin-bottom:16px;text-align:left;}
label{
  display:block;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:#4a6080;
  letter-spacing:0.2em;margin-bottom:8px;
}
input[type=password]{
  width:100%;background:#111820;
  border:1px solid #243044;border-radius:8px;
  padding:14px 16px;color:#f0f4f8;
  font-family:'JetBrains Mono',monospace;font-size:14px;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
input[type=password]:focus{
  border-color:#60a5fa;
  box-shadow:0 0 0 3px rgba(96,165,250,0.1);
}
button{
  width:100%;margin-top:8px;padding:14px;
  background:linear-gradient(135deg,#60a5fa,#c084fc);
  border:none;border-radius:8px;color:white;
  font-family:'Noto Serif JP',serif;font-size:15px;font-weight:700;
  letter-spacing:0.1em;cursor:pointer;
  transition:opacity 0.2s,transform 0.1s;
}
button:hover{opacity:0.85;transform:translateY(-1px);}
button:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.error{
  margin-top:14px;color:#f87171;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  display:none;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="sigil">⚔️</div>
  <h1>AI 参謀会議</h1>
  <div class="sub">STRATEGIC COUNCIL — RESTRICTED ACCESS</div>
  <div class="field">
    <label>ACCESS PASSWORD</label>
    <input type="password" id="pw" placeholder="パスワードを入力" autofocus>
  </div>
  <button id="login-btn" onclick="doLogin()">入 室</button>
  <div class="error" id="error-msg">パスワードが違います</div>
</div>

<script>
document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = '確認中...';

  // 保存されたパスワードハッシュと照合
  const storedHash = localStorage.getItem('council_pw_hash') || 
    '2c0b76bf1fd8b424669f809379543f42c16bfecdf88d7a16c967f8d5b6607c0e'; // SHA-256 of 'council2024'

  const inputHash = await sha256(pw);

  if (inputHash === storedHash) {
    localStorage.setItem('council_token', 'tk_' + Date.now());
    localStorage.setItem('council_expires', Date.now() + 86400000);
    window.location.href = '/app';
  } else {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('pw').value = '';
    btn.disabled = false;
    btn.textContent = '入 室';
  }
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
</script>
</body>
</html>
