<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI参謀会議 PRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400;600&family=Zen+Old+Mincho:wght@400;700&display=swap');
:root{
  --bg0:#080b0f;--bg1:#0d1117;--bg2:#111820;--bg3:#161e2a;
  --border:#1c2536;--border2:#243044;
  --claude:#60a5fa;--gpt:#34d399;--gemini:#fbbf24;--synth:#c084fc;
  --danger:#f87171;
  --text0:#f0f4f8;--text1:#9eb3cc;--text2:#4a6080;--text3:#2a3a50;
  --glow-claude:rgba(96,165,250,0.15);--glow-gpt:rgba(52,211,153,0.15);
  --glow-gemini:rgba(251,191,36,0.15);--glow-synth:rgba(192,132,252,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg0);color:var(--text1);font-family:'Noto Serif JP',serif;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(96,165,250,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(96,165,250,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.topbar{height:52px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:10;position:relative;}
.topbar-logo{display:flex;align-items:center;gap:10px;font-family:'Zen Old Mincho',serif;font-size:16px;color:var(--text0);letter-spacing:0.1em;}
.topbar-tabs{display:flex;gap:4px;margin-left:16px;}
.topbar-tab{padding:6px 16px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.15em;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all 0.2s;}
.topbar-tab.active{background:var(--bg3);color:var(--text0);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text2);}
.status-dot.ok{background:var(--gpt);box-shadow:0 0 5px var(--gpt);}
.topbar-btn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);background:none;border:1px solid var(--border2);border-radius:5px;padding:5px 12px;cursor:pointer;letter-spacing:0.15em;transition:all 0.2s;}
.topbar-btn:hover{color:var(--text1);border-color:var(--text2);}
.main-body{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px);}
.sidebar{width:220px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sidebar-header{padding:14px 16px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:0.25em;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.clear-btn{font-size:9px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:color 0.2s;}
.clear-btn:hover{color:var(--danger);}
.history-list{flex:1;overflow-y:auto;padding:8px;}
.history-list::-webkit-scrollbar{width:4px;}
.history-list::-webkit-scrollbar-thumb{background:var(--border2);}
.history-item{padding:10px 12px;border-radius:7px;cursor:pointer;margin-bottom:4px;transition:background 0.15s;border:1px solid transparent;}
.history-item:hover{background:var(--bg2);}
.history-item.active{background:var(--bg2);border-color:var(--border2);}
.history-item-title{font-size:12px;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.history-item-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text2);}
.new-btn{margin:10px;padding:10px;background:var(--bg2);border:1px dashed var(--border2);border-radius:7px;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.15em;cursor:pointer;transition:all 0.2s;text-align:center;}
.new-btn:hover{border-color:var(--claude);color:var(--claude);}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tab-panel{display:none;flex:1;overflow:hidden;flex-direction:column;}
.tab-panel.active{display:flex;}
.stage-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.stage-item{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--text3);white-space:nowrap;}
.stage-item.done{color:var(--gpt);}
.stage-item.active{color:var(--claude);}
.stage-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.stage-item.done .stage-dot{background:var(--gpt);}
.stage-item.active .stage-dot{background:var(--claude);box-shadow:0 0 8px var(--claude);animation:pdot 1s ease-in-out infinite;}
@keyframes pdot{0%,100%{opacity:1;}50%{opacity:0.3;}}
.stage-sep{color:var(--text3);}
.input-area{padding:14px 20px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;}
.mode-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.mode-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:0.2em;}
.mode-btn{padding:5px 14px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;}
.mode-btn.active{background:var(--bg3);color:var(--text0);}
.input-row{display:flex;gap:10px;align-items:flex-end;}
textarea{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;color:var(--text0);font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.7;outline:none;resize:none;min-height:58px;max-height:120px;transition:border-color 0.2s;}
textarea:focus{border-color:var(--claude);}
textarea::placeholder{color:var(--text2);}
.run-btn{padding:12px 22px;background:linear-gradient(135deg,var(--claude),var(--synth));border:none;border-radius:10px;color:white;font-family:'Noto Serif JP',serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:0.05em;transition:opacity 0.2s,transform 0.1s;flex-shrink:0;}
.run-btn:hover:not(:disabled){opacity:0.85;transform:translateY(-1px);}
.run-btn:disabled{opacity:0.35;cursor:not-allowed;}
.council-output{flex:1;overflow-y:auto;padding:20px;}
.council-output::-webkit-scrollbar{width:5px;}
.council-output::-webkit-scrollbar-thumb{background:var(--border2);}
.round-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:0.2em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.round-label::after{content:'';flex:1;height:1px;background:var(--border);}
.agent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.agent-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color 0.3s,box-shadow 0.3s;}
.agent-card.streaming{border-color:var(--claude);box-shadow:0 0 20px var(--glow-claude);}
.agent-card[data-agent="gpt"].streaming{border-color:var(--gpt);box-shadow:0 0 20px var(--glow-gpt);}
.agent-card[data-agent="gemini"].streaming{border-color:var(--gemini);box-shadow:0 0 20px var(--glow-gemini);}
.agent-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.agent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.agent-name{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:0.15em;}
.agent-role-badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:3px;letter-spacing:0.1em;border:1px solid;opacity:0.7;}
.agent-body{padding:14px;font-size:13px;line-height:1.85;color:var(--text1);min-height:140px;max-height:260px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;}
.synthesis-wrap{background:var(--bg1);border:1px solid var(--synth);border-radius:12px;overflow:hidden;box-shadow:0 0 40px var(--glow-synth);margin-top:4px;}
.synthesis-header{padding:12px 16px;border-bottom:1px solid rgba(192,132,252,0.2);display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,rgba(192,132,252,0.08),rgba(96,165,250,0.06));}
.synthesis-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--synth);letter-spacing:0.2em;font-weight:600;}
.synthesis-body{padding:18px 20px;font-size:14px;line-height:2;color:var(--text0);white-space:pre-wrap;word-break:break-word;}
.error-text{color:var(--danger);font-size:12px;}
.bcursor{display:inline-block;width:2px;height:13px;background:var(--claude);margin-left:1px;animation:blink 0.75s step-end infinite;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.settings-panel{overflow-y:auto;padding:28px 32px;}
.settings-section{margin-bottom:32px;}
.settings-section-title{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:0.25em;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.settings-field{margin-bottom:14px;}
.settings-field label{font-size:12px;color:var(--text1);display:block;margin-bottom:7px;}
.settings-input{width:100%;max-width:480px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;color:var(--text0);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
.settings-input:focus{border-color:var(--claude);}
.save-btn{margin-top:8px;padding:10px 24px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text0);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.15em;cursor:pointer;transition:all 0.2s;}
.save-btn:hover{border-color:var(--claude);color:var(--claude);}
.hint{font-size:11px;color:var(--text2);margin-top:5px;line-height:1.5;}
.pw-row{display:flex;gap:10px;max-width:480px;}
.pw-row .settings-input{flex:1;}
@media(max-width:860px){
  .agent-grid{grid-template-columns:1fr;}
  .sidebar{display:none;}
}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100vh;">
<div class="topbar">
  <div class="topbar-logo"><span>⚔️</span>AI参謀会議</div>
  <div class="topbar-tabs">
    <button class="topbar-tab active" onclick="switchTab('council',this)">COUNCIL</button>
    <button class="topbar-tab" onclick="switchTab('settings',this)">SETTINGS</button>
  </div>
  <div class="topbar-right">
    <span class="status-badge">
      <span class="status-dot" id="api-status-dot"></span>
      <span id="api-status-text">確認中</span>
    </span>
    <button class="topbar-btn" onclick="doLogout()">退室</button>
  </div>
</div>
<div class="main-body">
  <div class="sidebar">
    <div class="sidebar-header">SESSIONS <button class="clear-btn" onclick="clearHistory()">全削除</button></div>
    <div class="history-list" id="history-list"></div>
    <button class="new-btn" onclick="newSession()">＋ 新しい会議</button>
  </div>
  <div class="content">
    <div class="tab-panel active" id="tab-council">
      <div class="stage-bar" id="stage-bar">
        <div class="stage-item"><div class="stage-dot"></div>待機中</div>
      </div>
      <div class="input-area">
        <div class="mode-row">
          <span class="mode-label">MODE:</span>
          <button class="mode-btn active" onclick="setMode('loop',this)">🔄 仮説ループ</button>
          <button class="mode-btn" onclick="setMode('parallel',this)">⚡ 並列分担</button>
          <button class="mode-btn" onclick="setMode('both',this)">✦ 統合モード</button>
        </div>
        <div class="input-row">
          <textarea id="query-input" placeholder="戦略テーマ・問いを入力… (Ctrl+Enterで送信)" rows="2"
            onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter')runCouncil()"></textarea>
          <button class="run-btn" id="run-btn" onclick="runCouncil()">開 廷<br><small style="opacity:0.6;font-size:10px;">Ctrl+↵</small></button>
        </div>
      </div>
      <div class="council-output" id="council-output">
        <div style="padding:60px 0;text-align:center;">
          <div style="font-size:40px;margin-bottom:16px;">⚔️</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);letter-spacing:0.2em;">テーマを入力して参謀会議を開廷してください</div>
        </div>
      </div>
    </div>
    <div class="tab-panel" id="tab-settings">
      <div class="settings-panel">
        <div class="settings-section">
          <div class="settings-section-title">API KEYS</div>
          <div class="settings-field">
            <label>OpenAI API Key（GPT-4o）</label>
            <input type="password" class="settings-input" id="s-openai" placeholder="sk-proj-...">
            <div class="hint">platform.openai.com で取得</div>
          </div>
          <div class="settings-field">
            <label>Gemini API Key</label>
            <input type="password" class="settings-input" id="s-gemini" placeholder="AIzaSy...">
            <div class="hint">aistudio.google.com で取得（無料枠あり）</div>
          </div>
          <button class="save-btn" onclick="saveSettings()">保存する</button>
        </div>
        <div class="settings-section">
          <div class="settings-section-title">PASSWORD</div>
          <div class="settings-field">
            <label>パスワード変更</label>
            <div class="pw-row">
              <input type="password" class="settings-input" id="s-pw-new" placeholder="新しいパスワード">
              <input type="password" class="settings-input" id="s-pw-confirm" placeholder="確認">
            </div>
          </div>
          <button class="save-btn" onclick="changePassword()">変更する</button>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
// 認証チェック
(function(){
  const token = localStorage.getItem('council_token');
  const expires = localStorage.getItem('council_expires');
  if (!token || !expires || Date.now() > parseInt(expires)) {
    window.location.href = '/login';
  }
})();

function doLogout(){
  localStorage.removeItem('council_token');
  localStorage.removeItem('council_expires');
  window.location.href = '/login';
}

async function changePassword(){
  const np = document.getElementById('s-pw-new').value;
  const nc = document.getElementById('s-pw-confirm').value;
  if(!np){alert('新しいパスワードを入力してください');return;}
  if(np!==nc){alert('パスワードが一致しません');return;}
  // ハッシュ化してローカルに保存（Vercel環境変数での設定を案内）
  const hash = await sha256(np);
  localStorage.setItem('council_pw_hash', hash);
  document.getElementById('s-pw-new').value='';
  document.getElementById('s-pw-confirm').value='';
  alert('パスワードを変更しました（このデバイスのみ有効）\n\n全デバイスで変更するには、VercelのEnvironment Variablesで PASSWORD_HASH を更新してください。');
}

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const S={
  get:(k)=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
};

let currentMode='loop';
let currentSessionId=null;
let isRunning=false;

window.onload=()=>{
  const keys=S.get('council_keys')||{};
  if(keys.openai)document.getElementById('s-openai').value=keys.openai;
  if(keys.gemini)document.getElementById('s-gemini').value=keys.gemini;
  updateApiStatus();
  renderHistoryList();
  newSession();
};

function getKeys(){return S.get('council_keys')||{};}

function updateApiStatus(){
  const k=getKeys();
  const ok=k.openai&&k.gemini;
  document.getElementById('api-status-dot').className='status-dot'+(ok?' ok':'');
  document.getElementById('api-status-text').textContent=ok?'API接続済':'API未設定';
}

function saveSettings(){
  const keys={
    openai:document.getElementById('s-openai').value.trim(),
    gemini:document.getElementById('s-gemini').value.trim(),
  };
  S.set('council_keys',keys);
  updateApiStatus();
  alert('APIキーを保存しました');
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.topbar-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
}

function setMode(m,btn){
  currentMode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function getSessions(){return S.get('council_sessions')||[];}
function newSession(){
  currentSessionId='sess_'+Date.now();
  document.getElementById('council-output').innerHTML=`<div style="padding:60px 0;text-align:center;"><div style="font-size:40px;margin-bottom:16px;">⚔️</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);letter-spacing:0.2em;">テーマを入力して参謀会議を開廷してください</div></div>`;
  resetStageBar();
  renderHistoryList();
}
function saveSession(title,html){
  const sessions=getSessions();
  const idx=sessions.findIndex(s=>s.id===currentSessionId);
  const obj={id:currentSessionId,title:title.slice(0,40),date:new Date().toLocaleString('ja-JP'),html};
  if(idx>=0)sessions[idx]=obj;else sessions.unshift(obj);
  S.set('council_sessions',sessions.slice(0,50));
  renderHistoryList();
}
function loadSession(id){
  const s=getSessions().find(s=>s.id===id);
  if(!s)return;
  currentSessionId=id;
  document.getElementById('council-output').innerHTML=s.html;
  renderHistoryList();
  setStagesDone();
}
function clearHistory(){
  if(!confirm('全ての会議履歴を削除しますか？'))return;
  S.set('council_sessions',[]);
  renderHistoryList();
  newSession();
}
function renderHistoryList(){
  const list=document.getElementById('history-list');
  const sessions=getSessions();
  list.innerHTML=sessions.map(s=>`<div class="history-item${s.id===currentSessionId?' active':''}" onclick="loadSession('${s.id}')"><div class="history-item-title">${s.title}</div><div class="history-item-date">${s.date}</div></div>`).join('');
}

function resetStageBar(){document.getElementById('stage-bar').innerHTML=`<div class="stage-item"><div class="stage-dot"></div>待機中</div>`;}
function setStagesDone(){document.getElementById('stage-bar').innerHTML=`<div class="stage-item done"><div class="stage-dot"></div>完了</div>`;}
function renderStages(stages,activeIdx){
  document.getElementById('stage-bar').innerHTML=stages.map((s,i)=>{
    let cls='stage-item';
    if(i<activeIdx)cls+=' done';
    else if(i===activeIdx)cls+=' active';
    return `<div class="${cls}"><div class="stage-dot"></div>${s}</div>${i<stages.length-1?'<span class="stage-sep">›</span>':''}`;
  }).join('');
}

async function callClaude(system,userMsg){
  const r=await fetch('/api/claude',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system,message:userMsg})
  });
  const d=await r.json();
  if(!r.ok)throw new Error('Claude: '+(d.error?.message||r.status));
  return d.text;
}
async function callGPT(system,userMsg){
  const k=getKeys().openai;
  if(!k)throw new Error('OpenAI APIキーが未設定');
  const r=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
    body:JSON.stringify({model:'gpt-4o',max_tokens:1000,messages:[{role:'system',content:system},{role:'user',content:userMsg}]})
  });
  const d=await r.json();
  if(!r.ok)throw new Error('GPT-4o: '+(d.error?.message||r.status));
  return d.choices[0].message.content;
}
async function callGemini(prompt){
  const k=getKeys().gemini;
  if(!k)throw new Error('Gemini APIキーが未設定');
  const r=await fetch('/api/gemini',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt,apiKey:k})
  });
  const d=await r.json();
  if(!r.ok)throw new Error('Gemini: '+(d.error?.message||r.status));
  return d.text;
}

function makeAgentCard(agent,role,color){
  const id=`card-${agent}-${Date.now()}-${Math.random().toString(36).slice(2)}`;
  return {id,html:`<div class="agent-card" data-agent="${agent}" id="${id}"><div class="agent-header"><div class="agent-dot" style="background:${color}"></div><div class="agent-name" style="color:${color}">${agent.toUpperCase()}</div><div class="agent-role-badge" style="color:${color};border-color:${color}">${role}</div></div><div class="agent-body" id="body-${id}"><span class="bcursor"></span></div></div>`};
}
function setAgentContent(id,text,isError=false){
  const el=document.getElementById('body-'+id);
  if(!el)return;
  if(isError)el.innerHTML=`<span class="error-text">⚠️ ${text}</span>`;
  else el.textContent=text;
  document.getElementById(id)?.classList.remove('streaming');
}
function setAgentStreaming(id){document.getElementById(id)?.classList.add('streaming');}
function appendToOutput(html){
  const out=document.getElementById('council-output');
  const div=document.createElement('div');div.innerHTML=html;
  out.appendChild(div);out.scrollTop=out.scrollHeight;return div;
}
function appendRoundLabel(text){appendToOutput(`<div class="round-label">${text}</div>`);}
function appendAgentGrid(cards){appendToOutput(`<div class="agent-grid">${cards.map(c=>c.html).join('')}</div>`);}

async function runCouncil(){
  if(isRunning)return;
  const query=document.getElementById('query-input').value.trim();
  if(!query){alert('テーマを入力してください');return;}
  const keys=getKeys();
  if(!keys.openai||!keys.gemini){
    alert('APIキーが未設定です。SETTINGSタブで設定してください。');
    switchTab('settings',document.querySelectorAll('.topbar-tab')[1]);return;
  }
  isRunning=true;
  document.getElementById('run-btn').disabled=true;
  document.getElementById('council-output').innerHTML='';
  if(currentMode==='loop')await runLoopMode(query);
  else if(currentMode==='parallel')await runParallelMode(query);
  else await runBothMode(query);
  saveSession(query,document.getElementById('council-output').innerHTML);
  document.getElementById('run-btn').disabled=false;
  isRunning=false;
}

async function runLoopMode(query){
  const stages=['役割分担','仮説生成','検証・批判','反論統合','最終提言'];
  renderStages(stages,1);
  appendRoundLabel('【PHASE 1】仮説生成');
  const hCards=[makeAgentCard('claude','仮説立案','var(--claude)'),makeAgentCard('gpt','仮説立案','var(--gpt)'),makeAgentCard('gemini','仮説立案','var(--gemini)')];
  appendAgentGrid(hCards);hCards.forEach(c=>setAgentStreaming(c.id));
  const [h1,h2,h3]=await Promise.allSettled([
    callClaude('あなたは戦略的仮説立案の専門家です。与えられたテーマに対して、最も重要な仮説を1〜3個、論拠とともに簡潔に述べてください（350字以内）。',query),
    callGPT('あなたは実務視点の仮説立案者です。与えられたテーマに対して、実践的・具体的な仮説を1〜3個述べてください（350字以内）。',query),
    callGemini(`あなたは多角的視点の仮説立案者です。他の視点が見落としがちな仮説を1〜3個述べてください（350字以内）。\n\nテーマ：${query}`),
  ]);
  const hyp=[h1,h2,h3].map(r=>r.status==='fulfilled'?r.value:null);
  hCards.forEach((c,i)=>setAgentContent(c.id,hyp[i]||'エラー',!hyp[i]));
  const hypSum=hyp.filter(Boolean).map((h,i)=>['Claude','GPT-4o','Gemini'][i]+': '+h).join('\n\n');

  renderStages(stages,2);
  appendRoundLabel('【PHASE 2】検証・批判');
  const vCards=[makeAgentCard('claude','批判的検証','var(--claude)'),makeAgentCard('gpt','批判的検証','var(--gpt)'),makeAgentCard('gemini','批判的検証','var(--gemini)')];
  appendAgentGrid(vCards);vCards.forEach(c=>setAgentStreaming(c.id));
  const vp=`以下は3つのAIが「${query}」について立てた仮説です。\n\n${hypSum}\n\nこれらの仮説を批判的に検証し、弱点・見落とし・反証を指摘してください（350字以内）。`;
  const [v1,v2,v3]=await Promise.allSettled([
    callClaude('あなたは批判的思考の専門家です。',vp),
    callGPT('あなたは悪魔の代弁者です。',vp),
    callGemini(vp),
  ]);
  const ver=[v1,v2,v3].map(r=>r.status==='fulfilled'?r.value:null);
  vCards.forEach((c,i)=>setAgentContent(c.id,ver[i]||'エラー',!ver[i]));

  renderStages(stages,3);
  appendRoundLabel('【PHASE 3】反論を受けた再構築');
  const rCards=[makeAgentCard('claude','再構築','var(--claude)'),makeAgentCard('gpt','再構築','var(--gpt)'),makeAgentCard('gemini','再構築','var(--gemini)')];
  appendAgentGrid(rCards);rCards.forEach(c=>setAgentStreaming(c.id));
  const rp=`テーマ「${query}」について。\n当初の仮説:\n${hypSum}\n\n批判・反証:\n${ver.filter(Boolean).join('\n\n')}\n\n批判を受けて、より強固な立場・修正された主張を示してください（350字以内）。`;
  const [r1,r2,r3]=await Promise.allSettled([
    callClaude('あなたは反論を踏まえて主張を洗練させる戦略家です。',rp),
    callGPT('あなたは反論を踏まえて実務的解決策を再提示する専門家です。',rp),
    callGemini(rp),
  ]);
  const reb=[r1,r2,r3].map(r=>r.status==='fulfilled'?r.value:null);
  rCards.forEach((c,i)=>setAgentContent(c.id,reb[i]||'エラー',!reb[i]));

  renderStages(stages,4);
  appendRoundLabel('【PHASE 4】統合参謀提言');
  appendToOutput(`<div class="synthesis-wrap"><div class="synthesis-header"><div class="agent-dot" style="background:var(--synth)"></div><div class="synthesis-title">SYNTHESIS — 統合参謀提言</div></div><div class="synthesis-body" id="final-synth"><span class="bcursor"></span></div></div>`);
  const fp=`テーマ：${query}\n\n【仮説】\n${hypSum}\n\n【検証・批判】\n${ver.filter(Boolean).join('\n\n')}\n\n【再構築】\n${reb.filter(Boolean).join('\n\n')}\n\n上記の議論を統合し、以下の構成で最終参謀提言を作成:\n1. 核心的洞察\n2. 合意された方向性\n3. 残る不確実性・リスク\n4. 具体的行動指針（3つ）`;
  try{const s=await callClaude('あなたは総合参謀長です。複数のAIエージェントの議論を統合し、明快で実用的な最終提言を作成してください。',fp);document.getElementById('final-synth').textContent=s;}
  catch(e){document.getElementById('final-synth').innerHTML=`<span class="error-text">⚠️ ${e.message}</span>`;}
  setStagesDone();
}

async function runParallelMode(query){
  const stages=['役割分担','並列分析','統合提言'];
  renderStages(stages,1);
  appendRoundLabel('【PHASE 1】役割分担・並列分析');
  const cards=[makeAgentCard('claude','リサーチ & 構造分析','var(--claude)'),makeAgentCard('gpt','実務 & リスク評価','var(--gpt)'),makeAgentCard('gemini','創造的 & 異論視点','var(--gemini)')];
  appendAgentGrid(cards);cards.forEach(c=>setAgentStreaming(c.id));
  const [c,g,gem]=await Promise.allSettled([
    callClaude('あなたはリサーチと構造分析を担当する参謀です。テーマの背景・構造・因果関係を論理的に分析してください（400字以内）。',query),
    callGPT('あなたは実務とリスク評価を担当する参謀です。現実的な課題・リスク・機会を具体的に分析してください（400字以内）。',query),
    callGemini(`あなたは創造的視点と異論を担当する参謀です。常識に反するアイデア・見落とされた視点・逆説的洞察を提示してください（400字以内）。\n\nテーマ：${query}`),
  ]);
  const res=[c,g,gem].map(r=>r.status==='fulfilled'?r.value:null);
  cards.forEach((card,i)=>setAgentContent(card.id,res[i]||'エラー',!res[i]));
  renderStages(stages,2);
  appendRoundLabel('【PHASE 2】統合提言');
  appendToOutput(`<div class="synthesis-wrap"><div class="synthesis-header"><div class="agent-dot" style="background:var(--synth)"></div><div class="synthesis-title">SYNTHESIS — 統合参謀提言</div></div><div class="synthesis-body" id="final-synth"><span class="bcursor"></span></div></div>`);
  const sp=`テーマ：${query}\n\nリサーチ分析(Claude):\n${res[0]||'取得不可'}\n\n実務リスク(GPT-4o):\n${res[1]||'取得不可'}\n\n異論視点(Gemini):\n${res[2]||'取得不可'}\n\n3つの専門分析を統合し、最終参謀提言（核心洞察・行動指針3点・注意事項）を作成してください。`;
  try{const s=await callClaude('あなたは総合参謀長です。',sp);document.getElementById('final-synth').textContent=s;}
  catch(e){document.getElementById('final-synth').innerHTML=`<span class="error-text">⚠️ ${e.message}</span>`;}
  setStagesDone();
}

async function runBothMode(query){
  const stages=['役割分担','仮説生成','並列検証','反論統合','最終提言'];
  renderStages(stages,1);
  appendRoundLabel('【PHASE 1】並列仮説生成');
  const hCards=[makeAgentCard('claude','仮説','var(--claude)'),makeAgentCard('gpt','仮説','var(--gpt)'),makeAgentCard('gemini','仮説','var(--gemini)')];
  appendAgentGrid(hCards);hCards.forEach(c=>setAgentStreaming(c.id));
  const [h1,h2,h3]=await Promise.allSettled([
    callClaude('あなたは戦略参謀です。テーマに対して最重要な仮説を2個、論拠とともに述べてください（300字以内）。',query),
    callGPT('あなたは実務参謀です。テーマに対して実践的な仮説を2個述べてください（300字以内）。',query),
    callGemini(`あなたは異論参謀です。常識外の仮説を2個述べてください（300字以内）。\n\nテーマ：${query}`),
  ]);
  const hyp=[h1,h2,h3].map(r=>r.status==='fulfilled'?r.value:null);
  hCards.forEach((c,i)=>setAgentContent(c.id,hyp[i]||'エラー',!hyp[i]));
  const hs=hyp.filter(Boolean).map((h,i)=>['Claude','GPT','Gemini'][i]+': '+h).join('\n\n');

  renderStages(stages,2);
  appendRoundLabel('【PHASE 2】並列検証・批判');
  const vCards=[makeAgentCard('claude','検証','var(--claude)'),makeAgentCard('gpt','検証','var(--gpt)'),makeAgentCard('gemini','検証','var(--gemini)')];
  appendAgentGrid(vCards);vCards.forEach(c=>setAgentStreaming(c.id));
  const vp=`テーマ「${query}」の仮説:\n${hs}\n\nこれらを批判的に検証し、最重要な弱点を指摘してください（300字以内）。`;
  const [v1,v2,v3]=await Promise.allSettled([callClaude('あなたは批判的検証の専門家です。',vp),callGPT('あなたは悪魔の代弁者です。',vp),callGemini(vp)]);
  const ver=[v1,v2,v3].map(r=>r.status==='fulfilled'?r.value:null);
  vCards.forEach((c,i)=>setAgentContent(c.id,ver[i]||'エラー',!ver[i]));

  renderStages(stages,3);
  appendRoundLabel('【PHASE 3】反論統合');
  const rCards=[makeAgentCard('claude','再構築','var(--claude)'),makeAgentCard('gpt','再構築','var(--gpt)'),makeAgentCard('gemini','再構築','var(--gemini)')];
  appendAgentGrid(rCards);rCards.forEach(c=>setAgentStreaming(c.id));
  const rp=`テーマ：${query}\n仮説:\n${hs}\n批判:\n${ver.filter(Boolean).join('\n')}\n\n批判を踏まえて修正された主張を簡潔に述べてください（300字以内）。`;
  const [r1,r2,r3]=await Promise.allSettled([callClaude('あなたは反論を踏まえ主張を洗練させます。',rp),callGPT('あなたは反論を踏まえ実務的解決を提示します。',rp),callGemini(rp)]);
  const reb=[r1,r2,r3].map(r=>r.status==='fulfilled'?r.value:null);
  rCards.forEach((c,i)=>setAgentContent(c.id,reb[i]||'エラー',!reb[i]));

  renderStages(stages,4);
  appendRoundLabel('【PHASE 4】最終統合提言');
  appendToOutput(`<div class="synthesis-wrap"><div class="synthesis-header"><div class="agent-dot" style="background:var(--synth)"></div><div class="synthesis-title">SYNTHESIS — 統合参謀提言</div></div><div class="synthesis-body" id="final-synth"><span class="bcursor"></span></div></div>`);
  const fp=`テーマ：${query}\n\n仮説:\n${hs}\n\n検証批判:\n${ver.filter(Boolean).join('\n')}\n\n再構築:\n${reb.filter(Boolean).join('\n')}\n\n全フェーズを統合し、最終参謀提言（核心洞察・合意事項・リスク・行動指針3点）を作成してください。`;
  try{const s=await callClaude('あなたは総合参謀長です。全AIの議論を統合し明快な最終提言を作成してください。',fp);document.getElementById('final-synth').textContent=s;}
  catch(e){document.getElementById('final-synth').innerHTML=`<span class="error-text">⚠️ ${e.message}</span>`;}
  setStagesDone();
}
